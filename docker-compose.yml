services:
  db:
    image: postgres:15-alpine
    container_name: zapisi_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zapisi
    ports:
      - "7235:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zapisi"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zapisi_app
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/zapisi
      ADMIN_PASSWORD: admin
      PORT: ${PORT:-8080}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
